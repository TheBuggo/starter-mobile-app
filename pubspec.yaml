name: starter_app
description: Flutter starter app with Supabase auth, account management, themes, and in-app purchases.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  crypto: 3.0.7
  flutter:
    sdk: flutter
  in_app_purchase: 3.2.3
  supabase_flutter: 2.12.4
  url_launcher: 6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0

flutter:
  uses-material-design: true
